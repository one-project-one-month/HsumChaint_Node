name: PR Tests

on:
  workflow_run:
    workflows: ['PR Title Check']
    types: [completed]

jobs:
  tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:ci

  notify-test-failure:
    needs: tests
    if: failure()
    uses: ./.github/workflows/reusable-telegram.yml
    secrets: inherit
    with:
      message: |
        <b>🔔 Tests Failed</b>

        <b>Project:</b> NodeJS
        <b>Actor:</b> ${{ github.triggering_actor }}
        <b>Commit Message:</b> ${{ github.event.workflow_run.head_commit.message }}
        <b>Result:</b> Tests execution failed on PR commit.
