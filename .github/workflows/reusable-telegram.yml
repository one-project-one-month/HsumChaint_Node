name: Reusable Telegram Notify

on:
  workflow_call:
    inputs:
      message:
        required: true
        type: string
      format:
        required: false
        type: string
        default: 'HTML'
    secrets:
      TELEGRAM_CHAT_ID:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_GITHUB_TOPIC_ID:
        required: true

jobs:
  send:
    runs-on: ubuntu-slim
    steps:
      - name: send message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_GITHUB_TOPIC_ID }}
          MESSAGE: ${{ inputs.message }}
          FORMAT: ${{ inputs.format }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "message_thread_id=${THREAD_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=${FORMAT}"
