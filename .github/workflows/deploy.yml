name: Release & Deploy

on:
  push:
    branches: [main, develop]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set repo name to lowercase
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/${{ github.ref_name == 'main' && 'production' || 'develop' }}.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}:${{ github.ref_name }}
    outputs:
      repo_name: ${{ steps.repo.outputs.name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          envs: MYSQL_ROOT_PASSWORD,REDIS_PASSWORD,DB_NAME
          script: |
            PROJECT_DIR="$HOME/app-${{ github.ref_name }}"
            mkdir -p $PROJECT_DIR && cd $PROJECT_DIR

            # Set up .env
            cat <<EOF > .env
            IMAGE_NAME=ghcr.io/${{ needs.build-and-push.outputs.repo_name }}:${{ github.ref_name }}
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            REDIS_PASSWORD=$REDIS_PASSWORD
            DB_NAME=$DB_NAME
            EOF

            # Login and Pull
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Download config files
            curl -L https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/nginx.conf -o nginx.conf
            curl -L https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose-${{ github.ref_name }}.yaml -o docker-compose.yml

            # Deploy
            docker compose pull
            docker compose up -d --remove-orphans

            # Database Migration
            APP_SERVICE=${{ github.ref_name == 'main' && 'app_1' || 'app' }}
            docker compose exec -T $APP_SERVICE bunx prisma migrate deploy
