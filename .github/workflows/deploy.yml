name: Release & Deploy

on:
  push:
    branches: [main, staging]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ github.ref_name == 'main' && 'production' || 'staging' }}.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    strategy:
      max-parallel: 1
      matrix:
        server: ${{ github.ref_name == 'main' && fromJson('["IP_A", "IP_B"]') || fromJson('["STAGING_IP"]') }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.server }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: MYSQL_ROOT_PASSWORD,REDIS_PASSWORD,DB_NAME,APP_PORT
          script: |
            PROJECT_DIR="~/app-${{ github.ref_name }}"
            mkdir -p $PROJECT_DIR && cd $PROJECT_DIR

            cat <<EOF > .env
            IMAGE_NAME=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            REDIS_PASSWORD=$REDIS_PASSWORD
            DB_NAME=$DB_NAME
            APP_PORT=$APP_PORT
            EOF

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Download nginx only for production
            if [ "${{ github.ref_name }}" == "main" ]; then
              curl -L https://raw.githubusercontent.com/${{ github.repository }}/main/nginx.conf -o nginx.conf
            fi

            curl -L https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose-${{ github.ref_name }}.yaml -o docker-compose.yml

            docker compose pull
            docker compose up -d --remove-orphans

            # Migrate DB (only on primary server for prod, or always for staging)
            docker compose exec -T app bunx prisma migrate deploy
