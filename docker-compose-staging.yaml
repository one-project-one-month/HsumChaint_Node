services:
  app:
    image: ${IMAGE_NAME}
    container_name: hsumchaint_node_staging
    restart: unless-stopped
    ports:
      - "3001:3000" # Direct access for staging
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${DB_NAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:9.6
    container_name: hsumchaint_db_staging
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - hsumchaint_db_staging:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: redis_staging
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  hsumchaint_db_staging:
